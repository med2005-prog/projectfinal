<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Magnifying glass circle -->
  <circle cx="14" cy="13" r="6" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Location pin inside glass -->
  <circle cx="14" cy="12" r="2" fill="white" opacity="0.9"/>
  <path d="M14 14 L14 15.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="18.5" y1="17.5" x2="22" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
